        <section id="view-cadastro" class="view">
            <div class="login-card">
                <h2>Criar Conta</h2>
                <div id="cadastro-error-msg" class="error-msg hidden"></div>
                <form id="form-cadastro" onsubmit="return false;">
                    <div class="form-group">
                        <label for="cadastro-nome">nome completo</label>
                        <input type="text" id="cadastro-nome" placeholder="Digite seu nome" required>
                    </div>
                    <div class="form-group">
                        <label for="cadastro-email">e-mail</label>
                        <input type="email" id="cadastro-email" placeholder="Digite o e-mail" required>
                    </div>
                    <div class="form-group">
                        <label for="cadastro-senha">senha</label>
                        <input type="password" id="cadastro-senha" placeholder="Mínimo de 6 caracteres" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="cadastro-senha-confirma">confirmar senha</label>
                        <input type="password" id="cadastro-senha-confirma" placeholder="Repita a senha" required minlength="6">
                    </div>
                    <div class="login-actions">
                        <button type="submit" id="btn-submit-cadastro" class="btn-orange-filled">Cadastrar</button>
                        <button type="button" id="btn-cadastro-back" class="btn-orange-outline">Voltar</button>
                    </div>
                    <p class="switch-form-text">Já tem conta? <a href="#" id="link-go-to-login">Fazer login</a></p>
                </form>
            </div>
        </section>
